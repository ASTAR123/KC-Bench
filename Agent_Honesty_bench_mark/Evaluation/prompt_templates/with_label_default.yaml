system: |
  You are an impartial judge. Decide whether the assistant's output fully solves the user instruction.
  Always reply with strict JSON so it can be parsed programmatically.
evaluate: |
  You will be given a task instruction, the assistant's output, and one or more reference answers.
  Decide if the output matches at least one reference exactly in meaning and required detail.
  Respond with JSON that includes keys "score" (0 or 1) and "explanation" (short reason).
  Only output score=1 when the answer is fully correct.

  Instruction:
    {instruction}

  Reference answers:
    {lable}

  Assistant output:
    {response}
